    - { id: product.brand,         entityId: product, name: Brand,        dtype: string,  nullable: false, role: attribute,
        description: 'Product brand. 11 brands total; Contoso''s own-brand SKUs account for ~28% of the catalogue.',
        lineage: { sourceTable: product, sourceColumn: Brand }, schemaVersion: 1 }
    - { id: product.manufacturer,  entityId: product, name: Manufacturer, dtype: string,  nullable: false, role: attribute,
        lineage: { sourceTable: product, sourceColumn: Manufacturer }, schemaVersion: 1 }
    - { id: product.color,         entityId: product, name: Color,        dtype: string,  nullable: true,  role: attribute,
