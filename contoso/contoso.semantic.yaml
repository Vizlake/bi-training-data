# Phoenix canonical semantic model for the bundled Contoso fixture.
#
# Schema:    packages/semantic-layer/src/schema.ts (CanonicalSemanticModelSchema)
# Provenance: hand-authored 2026-05-28 against F-016 plumbing; populates the
#             ont_*/alg_* tables via @phoenix/ontology compileSemanticModel
#             at bootstrap. The first real consumer of the semantic-layer
#             plumbing. See project-delivery/features/022-contoso-semantic-demo.
#
# Numbers in metric.expr verified against the seeded contoso.* schema.
# Note: NetPrice and UnitCost are PER-UNIT amounts (not line totals), so
# revenue/cogs expressions carry an explicit * Quantity factor. ExchangeRate is
# native-per-USD (e.g. GBP≈0.69, AUD≈1.37, USD=1.0), so USD conversion DIVIDES
# by it: USD = native / ExchangeRate. (F-025 G20 corrected this — the metric
# exprs previously multiplied, which inverted FX for non-USD currencies and
# made per-currency/per-region USD breakdowns wrong; the ground-truth figures
# below supersede brainstorm §1.2, which used the pre-fix multiply.)

schemaVersion: 1
sourceId: contoso
generatedAt: '2026-05-28T00:00:00.000Z'

source:
  displayName: Contoso
  domain: retail
  description: |
    Contoso is a fictional global retailer selling consumer electronics, home
    appliances, and accessories. ~94k orders across 9.6 years (2016-05 →
    2025-12), five trading currencies (USD/EUR/CAD/GBP/AUD), 8 product
    categories, ~2.5k SKUs, 74 stores in 9 countries plus an Online store.
    All transactional amounts are in the order's native currency; the
    `revenue_usd` and `cogs_usd` metrics convert to USD automatically via the
    `ExchangeRate` column on each sale.
  audience: |
    Sales analysts, regional managers, category buyers, and finance reviewers.
    Questions tend to be about revenue, units, margin, store and customer
    breakdowns, and time-over-time trends.
  conventions:
    reportingCurrency: USD
    # F-024 — April–March fiscal year (a common retail/government convention):
    # FY2024 = Apr 2023 → Mar 2024, named by the calendar year it ENDS in. The
    # derived fiscal-grain dims (date.fiscal_year / date.fiscal_quarter) encode
    # the matching +9-month shift (12 − (startMonth−1) = 12 − 3 = 9).
    fiscalYearStart: 04-01
    timezone: UTC
    dataAsOf: '2025-12-31'
    # F-024 — the canonical time axis. The compiler truncates THIS column for
    # `timeGrain` queries (and derived-grain dims reference it), instead of
    # guessing a fact's order-date column. Contoso has a dedicated date entity
    # joined via sale.order_date = date.date.
    primaryDateProperty: date.date
    # ISO weeks start Monday (DuckDB's default); declared for the derived
    # week-grain dimension + future relative-time `*_week` ops.
    weekStart: monday
  glossary:
    - term: working day
      definition: A non-weekend day per the `date.WorkingDay` flag.
    - term: active customer
      definition: A customer with one or more orders within the answer's time window.
    - term: online store
      definition: |
        A single virtual store row (`store.StoreKey = 999999`,
        `store.Channel = 'Online'`) representing all e-commerce sales — not a
        physical location. Use the `store.channel` dim to split online vs in-store.
    - term: native currency
      definition: |
        The currency the order was transacted in, recorded on each sale row
        as `sale.CurrencyCode`. Use `revenue_usd` (not `revenue_native`) when
        comparing across regions.
    - term: region / market
      definition: |
        Geographic grouping. "Region" → `customer.continent` (NA/EU/AS/…) or
        `store.country_name`; "market" / "country" → `customer.country_full`.
        Pick the customer geo for buyer-side questions, store geo for
        location-side.
  examples:
    - prompt: What was revenue last quarter?
      description: USD-converted revenue for the most recent quarter in the data.
      tags: [revenue, time]
    - prompt: Top 10 customers by total spend
      description: Ranked by their lifetime USD-converted revenue.
      tags: [customers, ranking]
    - prompt: Best-selling product categories this year
      description: Categories ordered by units sold and USD-revenue this year.
      tags: [products, ranking]
    - prompt: How does our gross margin compare year-over-year?
      description: Gross margin % per year, USD-normalised.
      tags: [margin, time]

ontology:
  entities:
    - id: sale
      name: Sale
      displayName: Sale
      description: |
        A single sold line-item — one product, one customer, one store, on
        one day, in one currency. The canonical fact table. Use this for
        any revenue, units, COGS, or margin question. Also known as: line
        item, transaction. NEVER aggregate `NetPrice` or `UnitCost`
        directly across currencies — use the `revenue_usd` / `cogs_usd`
        metrics which include the FX conversion.
      schemaVersion: 1
    - id: order
      name: Order
      displayName: Order
      description: |
        An order header — one row per OrderKey. Each order has one customer,
        one store, one order date, and may contain multiple sale rows
        (line items). Use this entity ONLY for order-level counts
        ("how many orders were placed last week"). For revenue, units,
        or margin, use `sale`.
      schemaVersion: 1
    - id: customer
      name: Customer
      displayName: Customer
      description: |
        A retail buyer with demographics, geography, and a validity window
        (StartDT, EndDT) — Contoso applies slowly-changing-dimension type-2
        tracking. Also known as: client, buyer, shopper.

        Per-record / per-named-customer queries route to query_sql
        (per-customer is intentionally NOT exposed as a query_metric
        dimension — see algebra.dimensions comment).

        SQL conventions when joining sales → customer:
        - Columns are PascalCase: `GivenName`, `Surname`, `CountryFull`,
          `City`, `CustomerKey`, `StartDT`, `EndDT`.
        - Join key: `sale.CustomerKey = customer.CustomerKey`.
        - Currently-valid rows only: `WHERE customer.EndDT > current_date`.
          Without this filter, SCD-2 history rows duplicate and SUM(spend)
          double-counts.
        - Display name: `customer.GivenName || ' ' || customer.Surname AS name`.
        - Total spend in USD: `SUM(sale.NetPrice * sale.Quantity / sale.ExchangeRate)`.
          NetPrice is per-unit (× Quantity for the line total) and in the row's
          native currency; ExchangeRate is native-per-USD, so DIVIDE to get USD.
          Never `SUM(sale.NetPrice)` alone — Contoso transacts in 5 currencies
          (USD/EUR/CAD/GBP/AUD) and the column is per-unit native amount.

        Worked example — top 10 by spend:
          SELECT
            c.GivenName || ' ' || c.Surname AS name,
            c.CountryFull,
            ROUND(SUM(s.NetPrice * s.Quantity / s.ExchangeRate), 0) AS total_spend_usd
          FROM contoso.sales s
          JOIN contoso.customer c USING (CustomerKey)
          WHERE c.EndDT > current_date
          GROUP BY 1, 2
          ORDER BY total_spend_usd DESC
          LIMIT 10
      # F-025 — SCD type-2 validity, structured so it reaches the always-on
      # digest (and, in Phase 2, the compiler) — not just lookup_entity prose.
      validity:
        - { property: customer.end_dt, op: '>', value: current_date }
      # F-025 — display label expression. Real columns are GivenName/Surname
      # (PascalCase), NOT the FirstName/LastName an LLM tends to guess. Surfaced
      # in the always-on digest so raw query_sql SELECTs the right columns first try.
      labelExpr: GivenName || ' ' || Surname
      schemaVersion: 1
    - id: product
      name: Product
      displayName: Product
      description: |
        A SKU with cost, list price, brand, manufacturer, and a four-level
        category hierarchy (Category → SubCategory → Brand → Product).
        ~2,517 active SKUs across 8 categories. Also known as: item, SKU.
      schemaVersion: 1
    - id: store
      name: Store
      displayName: Store
      description: |
        A physical retail location or the single Online virtual store. Also
        known as: branch, location, outlet. Filter `status != 'Closed'`
        when ranking by current performance. ~64 of 74 stores have at
        least one sale in the data window.

        The Online virtual store has `StoreKey=999999`, `CountryName='Online'`,
        and is tagged `Channel='Online'`; every physical location is
        `Channel='In-store'`. Use the `store.channel` dim to split revenue
        online-vs-physical — do NOT group by `store.status` (which encodes
        Open/Closed/Restructured, unrelated to the channel question).
      schemaVersion: 1
    - id: date
      name: Date
      displayName: Date
      description: |
        Conformed calendar table covering 2016-01-01 → 2026-12-31 (11 years).
        Always join through this entity for time intelligence — the columns
        `Year`, `Quarter`, `YearMonth`, `WorkingDay` are the canonical
        time grains.
      schemaVersion: 1
    - id: currency_rate
      name: Currency rate
      displayName: Currency rate
      description: |
        Daily FX rates between every transactional currency pair. The
        `revenue_usd` metric reads `sale.ExchangeRate` directly off the
        sale row (pre-joined at order time); this entity is exposed for
        independent FX questions.
      schemaVersion: 1

  properties:
    # sale (13 cols — fact table, all annotated)
    - { id: sale.order_key,     entityId: sale, name: OrderKey,     dtype: int,       nullable: false, role: foreign_key,
        description: 'Foreign key to the order header. Multiple sale rows share an OrderKey when the order has multiple line items.',
        lineage: { sourceTable: sales, sourceColumn: OrderKey }, schemaVersion: 1 }
    - { id: sale.line_number,   entityId: sale, name: LineNumber,   dtype: int,       nullable: false, role: attribute,
        lineage: { sourceTable: sales, sourceColumn: LineNumber }, schemaVersion: 1 }
    - { id: sale.order_date,    entityId: sale, name: OrderDate,    dtype: date,      nullable: false, role: foreign_key,
        description: 'The date the order was placed. Joins to date.Date for time intelligence.',
        lineage: { sourceTable: sales, sourceColumn: OrderDate }, schemaVersion: 1 }
    - { id: sale.delivery_date, entityId: sale, name: DeliveryDate, dtype: date,      nullable: true,  role: attribute,
        lineage: { sourceTable: sales, sourceColumn: DeliveryDate }, schemaVersion: 1 }
    - { id: sale.customer_key,  entityId: sale, name: CustomerKey,  dtype: int,       nullable: false, role: foreign_key,
        lineage: { sourceTable: sales, sourceColumn: CustomerKey }, schemaVersion: 1 }
    - { id: sale.store_key,     entityId: sale, name: StoreKey,     dtype: int,       nullable: false, role: foreign_key,
        lineage: { sourceTable: sales, sourceColumn: StoreKey }, schemaVersion: 1 }
    - { id: sale.product_key,   entityId: sale, name: ProductKey,   dtype: int,       nullable: false, role: foreign_key,
        lineage: { sourceTable: sales, sourceColumn: ProductKey }, schemaVersion: 1 }
    - { id: sale.quantity,      entityId: sale, name: Quantity,     dtype: int,       nullable: false, role: attribute, unit: units,
        description: 'Number of items sold in this line. Use the `units_sold` metric for aggregations.',
        lineage: { sourceTable: sales, sourceColumn: Quantity }, schemaVersion: 1 }
    - { id: sale.unit_price,    entityId: sale, name: UnitPrice,    dtype: decimal,   nullable: false, role: attribute, unit: '{native currency}',
        description: 'Gross per-unit list price in the sale row''s CurrencyCode. NetPrice (after discount) is the column to aggregate, not this one.',
        lineage: { sourceTable: sales, sourceColumn: UnitPrice }, schemaVersion: 1 }
    - { id: sale.net_price,     entityId: sale, name: NetPrice,     dtype: decimal,   nullable: false, role: attribute, unit: '{native currency}',
        description: 'Per-unit price AFTER discount in the row''s CurrencyCode. Line revenue (native) = NetPrice * Quantity; for USD divide by ExchangeRate (which is native-per-USD). NEVER sum directly across rows — currencies differ AND the value is per-unit, not per-line. Use the `revenue_usd` metric.',
        lineage: { sourceTable: sales, sourceColumn: NetPrice }, schemaVersion: 1 }
    - { id: sale.unit_cost,     entityId: sale, name: UnitCost,     dtype: decimal,   nullable: false, role: attribute, unit: '{native currency}',
        description: 'Per-unit cost in the row''s CurrencyCode. Like NetPrice, do NOT sum directly. Use the `cogs_usd` metric (= SUM(UnitCost * Quantity / ExchangeRate); ExchangeRate is native-per-USD, so divide).',
        lineage: { sourceTable: sales, sourceColumn: UnitCost }, schemaVersion: 1 }
    - { id: sale.currency_code, entityId: sale, name: CurrencyCode, dtype: string,    nullable: false, role: attribute,
        description: 'ISO-4217 currency the order was transacted in. One of USD / EUR / CAD / GBP / AUD.',
        lineage: { sourceTable: sales, sourceColumn: CurrencyCode }, schemaVersion: 1 }
    - { id: sale.exchange_rate, entityId: sale, name: ExchangeRate, dtype: float,     nullable: false, role: attribute, unit: 'native per USD',
        description: 'Pre-joined FX rate: native-currency units per USD on the order date (e.g. GBP≈0.69, EUR≈0.92, AUD≈1.37; USD=1.0). DIVIDE a native amount by this to convert to USD: USD = native / ExchangeRate.',
        lineage: { sourceTable: sales, sourceColumn: ExchangeRate }, schemaVersion: 1 }

