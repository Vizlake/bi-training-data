    - { id: product.weight,        entityId: product, name: Weight,       dtype: float,   nullable: true,  role: attribute,
        lineage: { sourceTable: product, sourceColumn: Weight }, schemaVersion: 1 }
    - { id: product.weight_unit,   entityId: product, name: WeightUnit,   dtype: string,  nullable: true,  role: attribute,
