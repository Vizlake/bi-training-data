    - { id: order_to_store,      name: 'Order → Store',    inverseName: 'Store ← Order',   fromEntityId: order,    toEntityId: store,         cardinality: 'N:1', category: structural, schemaVersion: 1 }
    - { id: order_to_date,       name: 'Order → Date',     inverseName: 'Date ← Order',    fromEntityId: order,    toEntityId: date,          cardinality: 'N:1', category: structural, schemaVersion: 1 }
    - { id: product_category_hierarchy, name: 'Product category hierarchy', fromEntityId: product, toEntityId: product, cardinality: '1:1', category: classification, schemaVersion: 1 }

