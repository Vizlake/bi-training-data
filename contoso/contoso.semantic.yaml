        lineage: { sourceTable: currencyexchange, sourceColumn: Exchange }, schemaVersion: 1 }

  relationships:
    - { id: sale_to_customer,    name: 'Sale → Customer', inverseName: 'Customer ← Sale',  fromEntityId: sale,     toEntityId: customer,      cardinality: 'N:1', category: structural, schemaVersion: 1 }
    - { id: sale_to_product,     name: 'Sale → Product',  inverseName: 'Product ← Sale',   fromEntityId: sale,     toEntityId: product,       cardinality: 'N:1', category: structural, schemaVersion: 1 }
