    - { id: currency_rate.exchange,       entityId: currency_rate, name: Exchange,     dtype: float,  nullable: false, role: attribute, unit: 'to per from',
        description: 'Multiply a FromCurrency amount by this to convert to ToCurrency on the given Date. Self-pairs (USD→USD) are 1.0.',
        lineage: { sourceTable: currencyexchange, sourceColumn: Exchange }, schemaVersion: 1 }

  relationships:
    - { id: sale_to_customer,    name: 'Sale → Customer', inverseName: 'Customer ← Sale',  fromEntityId: sale,     toEntityId: customer,      cardinality: 'N:1', category: structural,
        joinFromProperty: sale.customer_key, joinToProperty: customer.customer_key, schemaVersion: 1 }
    - { id: sale_to_product,     name: 'Sale → Product',  inverseName: 'Product ← Sale',   fromEntityId: sale,     toEntityId: product,       cardinality: 'N:1', category: structural,
