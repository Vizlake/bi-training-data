algebra:
  # Curated dimension catalog drives query_metric's GROUP BY surface.
  # Inclusion principle: any aggregation an executive would ask for in
  # natural language ("revenue by region", "top products by margin",
  # "weekday vs weekend") should be expressible without query_sql. Per-
  # record drill-down (per-customer lookups, per-SKU inventory checks)
  # stays in query_sql — high cardinality + weak BI signal + display-
  # heavy. The LLM tool router learns that distinction from the digest.
  dimensions:
    # ── time (4 grains + month + weekday) ──────────────────────────────
    # chartKind:temporal — time-axis dimensions even though the stored
    # column dtype is int/string. Without the override the chart
    # heuristic mis-classifies them and lands on scatter.
    # `date.date` is the daily grain — required so sub-monthly questions
    # ("daily orders last 90 days", "weekly trend") route through
    # query_metric instead of speculatively trying it, falling back to
    # query_sql, and producing brittle column aliases.
    - { id: date.date,            name: Date,             entityId: date,     propertyId: date.date,            dtype: date,     chartKind: temporal, hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: date.year,            name: Year,             entityId: date,     propertyId: date.year,            dtype: int,      chartKind: temporal, hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    # name is "Year-quarter" (not just "Quarter") because propertyId
    # points at YearQuarter which yields "2024-Q1" labels — already
    # year-aware. The LLM should pick this alone for quarterly time
    # series, NOT date.year + date.quarter (yields awkward 2-dim chart).
    - { id: date.quarter,         name: 'Year-quarter',   entityId: date,     propertyId: date.year_quarter,    dtype: string,   chartKind: temporal, hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: date.year_month,      name: 'Year-month',     entityId: date,     propertyId: date.year_month,      dtype: string,   chartKind: temporal, hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: date.month,           name: Month,            entityId: date,     propertyId: date.month,           dtype: string,   schemaVersion: 1 }
    - { id: date.day_of_week,     name: 'Day of week',    entityId: date,     propertyId: date.day_of_week,     dtype: string,   schemaVersion: 1 }
    - { id: date.working_day,     name: 'Working day',    entityId: date,     propertyId: date.working_day,     dtype: string,   schemaVersion: 1 }
    # ── derived grains (F-024) ─────────────────────────────────────────
    # No source columns — the compiler DERIVES these from the base date
    # column (date.date) via DuckDB date functions, the way Looker/Cube do.
    # `entityId: date` drives the join; `expr` supplies the projected SQL
    # (its `date.date` ref rewrites to the physical Date column). week_start
    # is a real DATE (sorts itself); half_year / iso_week are string labels
    # whose lexical order ≠ chronological, so each declares a `sortExpr` that
    # the compiler orders by (generalised G6).
    - { id: date.week_start, name: Week, entityId: date, expr: "DATE_TRUNC('week', date.date)", dtype: date, chartKind: temporal,
        hierarchy: [date.year, date.quarter, date.year_month, date.week_start, date.date], schemaVersion: 1 }
    - { id: date.half_year,  name: 'Half-year', entityId: date,
        expr: "EXTRACT(year FROM date.date) || '-H' || CEIL(EXTRACT(month FROM date.date) / 6.0)::INT",
        sortExpr: 'date.date', dtype: string, chartKind: temporal, schemaVersion: 1 }
    - { id: date.iso_week,   name: 'ISO week', entityId: date,
        expr: "EXTRACT(isoyear FROM date.date) || '-W' || LPAD(EXTRACT(week FROM date.date)::VARCHAR, 2, '0')",
        sortExpr: 'date.date', dtype: string, chartKind: temporal, schemaVersion: 1 }
    # ── fiscal grains (F-024 Layer 3) — April–March fiscal year ────────
    # Derived from date.date by shifting +9 months (the conventions.
    # fiscalYearStart=04-01 offset: 12 − (4−1) = 9) so the calendar year/
    # quarter of the shifted date IS the fiscal year/quarter. FY named by the
    # year it ends in (Apr 2023 → FY2024-Q1). A source with a different fiscal
    # start changes the shift; the date-entity-author skill scaffolds it.
    # fiscal_year is an int (sorts itself); fiscal_quarter is a string label
    # ordered chronologically via sortExpr (the +9-month shifted real date).
    - { id: date.fiscal_year, name: 'Fiscal year', entityId: date,
        expr: "EXTRACT(year FROM date.date + INTERVAL '9 months')::INT", dtype: int, chartKind: temporal,
        hierarchy: [date.fiscal_year, date.fiscal_quarter], schemaVersion: 1 }
    - { id: date.fiscal_quarter, name: 'Fiscal quarter', entityId: date,
        expr: "'FY' || EXTRACT(year FROM date.date + INTERVAL '9 months')::INT || '-Q' || EXTRACT(quarter FROM date.date + INTERVAL '9 months')::INT",
        sortExpr: 'date.date', dtype: string, chartKind: temporal,
        hierarchy: [date.fiscal_year, date.fiscal_quarter], schemaVersion: 1 }
    # ── customer geo + demographic ─────────────────────────────────────
    # Per-customer NOT exposed (intentional). "Top customers" / "customer
    # X's history" are display-tier queries the LLM routes to query_sql.
    - { id: customer.continent,    name: Continent,        entityId: customer, propertyId: customer.continent,    dtype: string,   hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: customer.country_full, name: Country,          entityId: customer, propertyId: customer.country_full, dtype: string,   hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: customer.state,        name: 'Customer state', entityId: customer, propertyId: customer.state,        dtype: string,   hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: customer.city,         name: 'Customer city',  entityId: customer, propertyId: customer.city,         dtype: string,   hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: customer.occupation,   name: Occupation,       entityId: customer, propertyId: customer.occupation,   dtype: string,   schemaVersion: 1 }
    - { id: customer.gender,       name: Gender,           entityId: customer, propertyId: customer.gender,       dtype: string,   schemaVersion: 1 }
    # ── product hierarchy (category → subcategory → brand → product) ──
    - { id: product.category_name,    name: 'Product category',    entityId: product, propertyId: product.category_name,    dtype: string, hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: product.subcategory_name, name: 'Product subcategory', entityId: product, propertyId: product.subcategory_name, dtype: string, hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: product.brand,            name: Brand,                 entityId: product, propertyId: product.brand,            dtype: string, hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: product.product_name,     name: Product,               entityId: product, propertyId: product.product_name,     dtype: string, hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: product.color,            name: Color,                 entityId: product, propertyId: product.color,            dtype: string, schemaVersion: 1 }
    - { id: product.manufacturer,     name: Manufacturer,          entityId: product, propertyId: product.manufacturer,     dtype: string, schemaVersion: 1 }
    # ── store ──────────────────────────────────────────────────────────
    # G14: the human-readable per-store label ("Contoso Store <place>",
    # "Online store"). Without this exposed, per-store breakdowns could
    # only group by store_code (raw -1 / 9 / 8), which is unreadable.
    # Mirrors product.product_name. Prefer this over store_code when the
    # user wants to SEE which store.
    - { id: store.name,           name: Store,            entityId: store,    propertyId: store.description,    dtype: string,   schemaVersion: 1 }
    - { id: store.country_name,   name: 'Store country',  entityId: store,    propertyId: store.country_name,   dtype: string,   schemaVersion: 1 }
    - { id: store.channel,        name: 'Sales channel',  entityId: store,    propertyId: store.channel,        dtype: string,   schemaVersion: 1 }
    - { id: store.state,          name: 'Store state',    entityId: store,    propertyId: store.state,          dtype: string,   schemaVersion: 1 }
    - { id: store.store_code,     name: 'Store code',     entityId: store,    propertyId: store.store_code,     dtype: string,   schemaVersion: 1 }
    - { id: store.status,         name: 'Store status',   entityId: store,    propertyId: store.status,         dtype: string,   schemaVersion: 1 }

  metrics:
    # ── 6 atomic ──
    - id: revenue_usd
      name: revenue_usd
      displayName: Revenue (USD)
      description: |
        Total revenue (sales, turnover, topline), USD-converted at each sale's
        order-date FX rate. Computed as SUM(NetPrice * Quantity / ExchangeRate):
        NetPrice is the per-unit price after discount (× Quantity for the line
        total), in the row's native currency; ExchangeRate is native-per-USD,
        so DIVIDE to convert to USD. Verified ground truth: $219,837,056 over
        the full data window.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.net_price * sale.quantity / sale.exchange_rate)
      defaultChart: line
      schemaVersion: 1
    - id: revenue_native
      name: revenue_native
      displayName: Revenue (native currency)
      description: |
        Same line-revenue arithmetic as `revenue_usd` but WITHOUT the FX
        conversion — leaves each row in its own native currency. Only useful
        when grouped by `sale.currency_code`; never aggregate across
        currencies without applying ExchangeRate first.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.net_price * sale.quantity)
      defaultChart: bar
      schemaVersion: 1
    - id: units_sold
      name: units_sold
      displayName: Units sold
      description: |
        Units sold — quantity, volume (sum of line quantities). Verified ground
        truth: 703,621 units over the full data window.
      entityId: sale
      language: duckdb-sql
      agg: sum
      sourceColumn: sale.quantity
      expr: SUM(sale.quantity)
      defaultChart: bar
      schemaVersion: 1
    - id: orders_count
      name: orders_count
      displayName: Orders
      description: |
        Distinct order count (orders, transactions, order volume). One order
        may have many sale rows; this metric deduplicates by OrderKey. Verified
        ground truth: 93,470 orders over the full data window.
      entityId: sale
      language: duckdb-sql
      agg: count_distinct
      sourceColumn: sale.order_key
      expr: COUNT(DISTINCT sale.order_key)
      defaultChart: bar
      schemaVersion: 1
    - id: customers_count
      name: customers_count
      displayName: Active customers
      description: |
        Distinct customer count among those who placed at least one order in
        the answer window. Verified ground truth: 52,189 across the full
        data window (a 49.7% subset of the 104,990 customer rows).
      entityId: sale
      language: duckdb-sql
      agg: count_distinct
      sourceColumn: sale.customer_key
      expr: COUNT(DISTINCT sale.customer_key)
      defaultChart: kpi
      schemaVersion: 1
    - id: cogs_usd
      name: cogs_usd
      displayName: COGS (USD)
      description: |
        Total cost of goods sold, USD-converted. Computed as SUM(UnitCost *
        Quantity / ExchangeRate) — same per-unit × quantity ÷ FX pattern as
        `revenue_usd` (ExchangeRate is native-per-USD, so divide). Verified
        ground truth: $96,924,928.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.unit_cost * sale.quantity / sale.exchange_rate)
      defaultChart: line
      schemaVersion: 1

    # ── 4 derived ──
    - id: gross_margin_usd
      name: gross_margin_usd
      displayName: Gross margin (USD)
      description: |
        Gross profit — revenue minus COGS in USD (margin dollars, GM$). Both
        inputs are USD-converted at the sale row's FX rate. Verified ground
        truth: $122,912,127.
      language: duckdb-sql
      derivedFrom: [revenue_usd, cogs_usd]
      expr: revenue_usd - cogs_usd
      defaultChart: line
      schemaVersion: 1
    - id: gross_margin_pct
      name: gross_margin_pct
      displayName: Gross margin %
      description: |
        Gross margin percentage / rate of revenue (margin %, markup, GM%). Uses
        NULLIF on the denominator to avoid divide-by-zero on empty filters.
        Verified ground truth: 55.9% across the full data window.
      language: duckdb-sql
      derivedFrom: [gross_margin_usd, revenue_usd]
      expr: gross_margin_usd / NULLIF(revenue_usd, 0)
      defaultChart: line
      schemaVersion: 1
    - id: avg_order_value_usd
      name: avg_order_value_usd
      displayName: AOV (USD)
      description: |
        Average order value (AOV, average basket, average ticket) in USD —
        revenue divided by distinct order count. Both inputs are
        pre-aggregated; NULLIF guards zero-order slices. Ground truth: $2,351.95.
      language: duckdb-sql
      derivedFrom: [revenue_usd, orders_count]
      expr: revenue_usd / NULLIF(orders_count, 0)
      defaultChart: kpi
      schemaVersion: 1
    - id: units_per_order
      name: units_per_order
      displayName: Units / order
      description: |
        Average line-item count per order: total units sold divided by
        distinct orders. Verified ground truth: 7.53 across the full data
        window.
      language: duckdb-sql
      derivedFrom: [units_sold, orders_count]
      expr: units_sold / NULLIF(orders_count, 0)
      defaultChart: kpi
      schemaVersion: 1
