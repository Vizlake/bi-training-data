    - { id: date.month_number,    entityId: date, name: MonthNumber,  dtype: int,    nullable: false, role: attribute,
        lineage: { sourceTable: date, sourceColumn: MonthNumber }, schemaVersion: 1 }
    - { id: date.day_of_week,     entityId: date, name: DayofWeek,    dtype: string, nullable: false, role: attribute,
