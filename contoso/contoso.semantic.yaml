algebra:
  dimensions:
    - { id: date.year,            name: Year,             entityId: date,     propertyId: date.year,            dtype: int,      hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: date.quarter,         name: Quarter,          entityId: date,     propertyId: date.year_quarter,    dtype: string,   hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: date.year_month,      name: 'Year-month',     entityId: date,     propertyId: date.year_month,      dtype: string,   hierarchy: [date.year, date.quarter, date.year_month, date.date], schemaVersion: 1 }
    - { id: customer.continent,   name: Continent,        entityId: customer, propertyId: customer.continent,   dtype: string,   hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: customer.country_full, name: Country,         entityId: customer, propertyId: customer.country_full, dtype: string,  hierarchy: [customer.continent, customer.country_full, customer.state, customer.city], schemaVersion: 1 }
    - { id: product.category_name, name: 'Product category', entityId: product, propertyId: product.category_name, dtype: string, hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: product.brand,        name: Brand,            entityId: product,  propertyId: product.brand,        dtype: string,   hierarchy: [product.category_name, product.subcategory_name, product.brand, product.product_name], schemaVersion: 1 }
    - { id: store.country_name,   name: 'Store country',  entityId: store,    propertyId: store.country_name,   dtype: string,   schemaVersion: 1 }

  metrics:
    # ── 6 atomic ──
    - id: revenue_usd
      name: revenue_usd
      displayName: Revenue (USD)
      description: |
        Total revenue, USD-converted from each sale's native currency at the
        order-date FX rate. Computed as SUM(NetPrice * Quantity * ExchangeRate)
        because NetPrice is the per-unit price after discount, not the line
        total. Verified ground truth: $223,597,711 over the full data window.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.net_price * sale.quantity * sale.exchange_rate)
      schemaVersion: 1
    - id: revenue_native
      name: revenue_native
      displayName: Revenue (native currency)
      description: |
        Same line-revenue arithmetic as `revenue_usd` but WITHOUT the FX
        conversion — leaves each row in its own native currency. Only useful
        when grouped by `sale.currency_code`; never aggregate across
        currencies without applying ExchangeRate first.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.net_price * sale.quantity)
      schemaVersion: 1
    - id: units_sold
      name: units_sold
      displayName: Units sold
      description: |
        Total number of items sold (sum of line quantities). Verified ground
        truth: 703,621 units over the full data window.
      entityId: sale
      language: duckdb-sql
      agg: sum
      sourceColumn: sale.quantity
      expr: SUM(sale.quantity)
      schemaVersion: 1
    - id: orders_count
      name: orders_count
      displayName: Orders
      description: |
        Distinct order count. One order may have many sale rows; this metric
        deduplicates by OrderKey. Verified ground truth: 93,470 orders over
        the full data window.
      entityId: sale
      language: duckdb-sql
      agg: count_distinct
      sourceColumn: sale.order_key
      expr: COUNT(DISTINCT sale.order_key)
      schemaVersion: 1
    - id: customers_count
      name: customers_count
      displayName: Active customers
      description: |
        Distinct customer count among those who placed at least one order in
        the answer window. Verified ground truth: 52,189 across the full
        data window (a 49.7% subset of the 104,990 customer rows).
      entityId: sale
      language: duckdb-sql
      agg: count_distinct
      sourceColumn: sale.customer_key
      expr: COUNT(DISTINCT sale.customer_key)
      schemaVersion: 1
    - id: cogs_usd
      name: cogs_usd
      displayName: COGS (USD)
      description: |
        Total cost of goods sold, USD-converted. Computed as SUM(UnitCost *
        Quantity * ExchangeRate) — same per-unit-times-quantity-times-FX
        pattern as `revenue_usd`. Verified ground truth: $98,606,503.
      entityId: sale
      language: duckdb-sql
      expr: SUM(sale.unit_cost * sale.quantity * sale.exchange_rate)
      schemaVersion: 1

    # ── 4 derived ──
    - id: gross_margin_usd
      name: gross_margin_usd
      displayName: Gross margin (USD)
      description: |
        Revenue minus COGS, in USD. Both inputs are USD-converted at the
        sale row's FX rate. Verified ground truth: $124,991,207.
      language: duckdb-sql
      derivedFrom: [revenue_usd, cogs_usd]
      expr: revenue_usd - cogs_usd
      schemaVersion: 1
    - id: gross_margin_pct
      name: gross_margin_pct
      displayName: Gross margin %
      description: |
        Gross margin as a fraction of revenue. Uses NULLIF on the denominator
        to avoid divide-by-zero on empty filters. Verified ground truth:
        55.9% across the full data window.
      language: duckdb-sql
      derivedFrom: [gross_margin_usd, revenue_usd]
      expr: gross_margin_usd / NULLIF(revenue_usd, 0)
      schemaVersion: 1
    - id: avg_order_value_usd
      name: avg_order_value_usd
      displayName: AOV (USD)
      description: |
        Average order value in USD: revenue divided by distinct order count.
        Both inputs are pre-aggregated; NULLIF guards against zero-order
        filter slices. Verified ground truth: $2,392.19.
      language: duckdb-sql
      derivedFrom: [revenue_usd, orders_count]
      expr: revenue_usd / NULLIF(orders_count, 0)
      schemaVersion: 1
    - id: units_per_order
      name: units_per_order
      displayName: Units / order
      description: |
        Average line-item count per order: total units sold divided by
        distinct orders. Verified ground truth: 7.53 across the full data
        window.
      language: duckdb-sql
      derivedFrom: [units_sold, orders_count]
      expr: units_sold / NULLIF(orders_count, 0)
      schemaVersion: 1
