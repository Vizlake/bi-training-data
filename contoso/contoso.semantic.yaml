        description: 'Y/N flag for non-weekend days. About 69% of rows are working days.',
        lineage: { sourceTable: date, sourceColumn: WorkingDay }, schemaVersion: 1 }

    # currency_rate (4 cols)
    - { id: currency_rate.date,           entityId: currency_rate, name: Date,         dtype: date,  nullable: false, role: primary_key,
